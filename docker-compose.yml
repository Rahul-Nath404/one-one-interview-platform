version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: interviewos_postgres
    environment:
      POSTGRES_USER: interviewos
      POSTGRES_PASSWORD: interviewos_dev
      POSTGRES_DB: interviewos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: interviewos_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: interviewos_backend
    environment:
      DATABASE_URL: postgres://interviewos:interviewos_dev@postgres:5432/interviewos
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-secret-key-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 8080
      ENV: development
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: go run main.go

  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: interviewos_piston
    privileged: true
    ports:
      - "2000:2000"
    volumes:
      - piston_data:/piston

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: interviewos_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  piston_data:
